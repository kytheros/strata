apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: strata-mcp
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: STRATA_DATA_DIR
              value: /data
            - name: STRATA_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: strata-license-key
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: strata-data
              mountPath: /data
      terminationGracePeriodSeconds: 10
      volumes:
        - name: strata-data
          csi:
            driver: gcsfuse.run.googleapis.com
            volumeAttributes:
              bucketName: BUCKET_PLACEHOLDER
