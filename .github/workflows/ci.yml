name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # npm audit for known vulnerabilities in dependencies
      - name: npm audit
        id: npm_audit
        run: npm audit --omit=dev --audit-level=moderate

      # Semgrep SAST scan
      - name: Semgrep scan
        id: semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            .semgrep/custom-rules.yml
            p/typescript
            p/nodejs

      # Check for secrets/credentials accidentally committed
      - name: Secret scanning with Gitleaks
        id: gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          ./gitleaks detect --source . --verbose --no-banner

      # Summarize security findings on PRs
      - name: Comment security summary on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const npmAuditResult = '${{ steps.npm_audit.outcome }}';
            const semgrepResult = '${{ steps.semgrep.outcome }}';
            const gitleaksResult = '${{ steps.gitleaks.outcome }}';

            const icon = (result) => result === 'success' ? ':white_check_mark:' : ':x:';

            const body = [
              '## Security Scan Summary',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| npm audit | ${icon(npmAuditResult)} ${npmAuditResult} |`,
              `| Semgrep SAST | ${icon(semgrepResult)} ${semgrepResult} |`,
              `| Gitleaks secrets | ${icon(gitleaksResult)} ${gitleaksResult} |`,
              '',
              npmAuditResult !== 'success' ? '> :warning: **npm audit** found vulnerabilities in dependencies. Run `npm audit --omit=dev` locally for details.' : '',
              semgrepResult !== 'success' ? '> :warning: **Semgrep** found code quality or security issues. Run `npm run security:scan` locally (requires Docker).' : '',
              gitleaksResult !== 'success' ? '> :warning: **Gitleaks** detected potential secrets in the codebase. Run `npm run security:secrets` locally.' : '',
            ].filter(Boolean).join('\n');

            // Find existing comment to update instead of creating duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Security Scan Summary')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check dependency licenses
        run: npx license-checker --production --failOn "GPL-3.0;AGPL-3.0;SSPL-1.0" --summary
