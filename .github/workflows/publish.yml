name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PG_URL: postgresql://postgres:test@localhost:5432/postgres
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run rebuild:native
      - run: npm run build
      - run: npm test

      # Pack-and-test: install the about-to-publish tarball in a scratch dir
      # and exercise the CLI surface. Catches regressions that integration tests
      # miss because they import library functions directly and bypass:
      #   - The arg parser (e.g. a new flag missing from parseArgs)
      #   - The help text registry (e.g. a new subcommand not advertised)
      #   - The packaged file set (e.g. a runtime file excluded from package.json `files`)
      #   - Native rebuild artifacts in the published shape
      # Aborts publish on smoke failure.
      - name: Pack-and-test smoke
        run: |
          set -euo pipefail
          npm pack
          TARBALL=$(ls strata-mcp-*.tgz | head -1)
          SCRATCH=$(mktemp -d)
          cd "$SCRATCH"
          npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE/$TARBALL"
          # Smoke 1: version reports correctly
          ./node_modules/.bin/strata --version
          # Smoke 2: --help advertises the index subcommand (1.9 regression guard)
          ./node_modules/.bin/strata --help | grep -q "strata index --rebuild-turns"
          # Smoke 3: index --rebuild-turns parses and runs (parseArgs guard)
          # An empty ~/.strata is fine; the command should exit 0 with "no sessions" or similar.
          ./node_modules/.bin/strata index --rebuild-turns --dry-run

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
