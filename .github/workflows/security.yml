name: Security Scanning

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run Semgrep
        run: |
          semgrep \
            --config .semgrep/custom-rules.yml \
            --sarif --output semgrep.sarif \
            --error \
            --exclude node_modules \
            --exclude dist \
            --exclude '*.lock' \
            .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Install and run Gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          ./gitleaks detect --source . --config .gitleaks.toml --verbose --no-banner

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci && npm audit --audit-level=high

  security-gate:
    name: Security Gate
    needs: [semgrep, gitleaks, npm-audit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "Semgrep: ${{ needs.semgrep.result }}"
          echo "Gitleaks: ${{ needs.gitleaks.result }}"
          echo "npm audit: ${{ needs.npm-audit.result }}"

          if [ "${{ needs.semgrep.result }}" != "success" ] || \
             [ "${{ needs.gitleaks.result }}" != "success" ] || \
             [ "${{ needs.npm-audit.result }}" != "success" ]; then
            echo "::error::Security checks failed — PR cannot be merged"
            exit 1
          fi
          echo "All security checks passed"

  pr-comment:
    name: PR Security Summary
    needs: [semgrep, gitleaks, npm-audit]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const results = {
              'Semgrep SAST': '${{ needs.semgrep.result }}',
              'Gitleaks': '${{ needs.gitleaks.result }}',
              'npm audit': '${{ needs.npm-audit.result }}'
            };

            const icon = (r) => r === 'success' ? ':white_check_mark:' : ':x:';
            const rows = Object.entries(results)
              .map(([name, result]) => `| ${icon(result)} | ${name} | ${result} |`)
              .join('\n');

            const allPassed = Object.values(results).every(r => r === 'success');
            const header = allPassed
              ? ':shield: **Security Scan — All Passed**'
              : ':rotating_light: **Security Scan — Failures Detected**';

            const body = `${header}

            | Status | Check | Result |
            |--------|-------|--------|
            ${rows}

            <sub>Generated by security pipeline · [View workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})</sub>`;

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Security Scan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
