apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: {{SERVICE_NAME}}
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "{{MAX_INSTANCES}}"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/cloudsql-instances: "{{CLOUD_SQL_CONNECTION}}"
    spec:
      containerConcurrency: 80
      containers:
        - image: {{IMAGE_URL}}
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: latest
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
