version: '3'

# Strata-on-AWS deploy controller.
#
# Cost-control cadence: bring the dev stack up only when actively working,
# tear it down between sessions. Bootstrap (state bucket + OIDC) stays up
# always at ~$0/mo; the rest of Phase 1 costs ~$345/mo when applied and
# ~$0/mo when destroyed.
#
# Install task (one-time, Windows): winget install Task.Task
# Install task (any OS):             https://taskfile.dev/installation/
#
# Run `task` (no args) for the full task list.

vars:
  AWS_PROFILE: '{{.AWS_PROFILE | default "default"}}'
  AWS_REGION: '{{.AWS_REGION | default "us-east-1"}}'
  EXPECTED_ACCOUNT: '624990353897'

tasks:
  default:
    desc: 'List available tasks'
    silent: true
    cmds:
      - task --list

  whoami:
    desc: 'Print AWS identity (sanity check before any apply/destroy)'
    cmds:
      - aws sts get-caller-identity --profile {{.AWS_PROFILE}}

  preflight:
    desc: 'Verify AWS account is the expected dev account before mutating'
    silent: true
    cmds:
      - |
        ACCT=$(aws sts get-caller-identity --profile {{.AWS_PROFILE}} --query Account --output text | tr -d '[:space:]')
        if [ "$ACCT" != "{{.EXPECTED_ACCOUNT}}" ]; then
          echo "ERROR: expected account {{.EXPECTED_ACCOUNT}}, got '$ACCT'" >&2
          exit 1
        fi
        echo "AWS account: $ACCT (OK)"

  # -------------------------------------------------------------------------
  # Bootstrap — apply ONCE per account. Stays up. ~$0/mo.
  # -------------------------------------------------------------------------

  bootstrap:up:
    desc: 'Apply bootstrap (state bucket + OIDC). Run once per account.'
    dir: bootstrap/examples/dev
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  bootstrap:status:
    desc: 'List bootstrap-managed resources'
    dir: bootstrap/examples/dev
    cmds:
      - terraform state list

  bootstrap:down:
    desc: '(rarely) Destroy bootstrap. ONLY if you are tearing down the entire account.'
    dir: bootstrap/examples/dev
    deps: [preflight]
    prompt: 'This destroys the state bucket and OIDC provider. Continue?'
    cmds:
      - terraform destroy

  # -------------------------------------------------------------------------
  # Network — Phase 1 module. ~$265/mo idle when up.
  # -------------------------------------------------------------------------

  network:plan:
    desc: 'Plan network changes (no mutation)'
    dir: modules/network/examples/basic
    cmds:
      - terraform init -upgrade
      - terraform plan -out plan.tfplan

  network:up:
    desc: 'Apply network module (VPC + endpoints + NAT). ~6–8 min. +$265/mo.'
    dir: modules/network/examples/basic
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  network:down:
    desc: 'Destroy network module. ~5–7 min. Frees ~$265/mo.'
    dir: modules/network/examples/basic
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  network:status:
    desc: 'Show network resources currently deployed'
    dir: modules/network/examples/basic
    cmds:
      - terraform state list

  # -------------------------------------------------------------------------
  # ECS cluster — AWS-1.2. ~$1/mo idle (per-cluster CMK).
  # -------------------------------------------------------------------------

  ecs-cluster:plan:
    desc: 'Plan ecs-cluster changes (no mutation)'
    dir: modules/ecs-cluster/examples/basic
    cmds:
      - terraform init -upgrade
      - terraform plan -out plan.tfplan

  ecs-cluster:up:
    desc: 'Apply ecs-cluster module (Fargate + Spot + KMS-encrypted logs). +$1/mo.'
    dir: modules/ecs-cluster/examples/basic
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  ecs-cluster:down:
    desc: 'Destroy ecs-cluster. CMK enters 7-day deletion window.'
    dir: modules/ecs-cluster/examples/basic
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  ecs-cluster:status:
    desc: 'Show ecs-cluster resources currently deployed'
    dir: modules/ecs-cluster/examples/basic
    cmds:
      - terraform state list

  # -------------------------------------------------------------------------
  # S3 bucket — AWS-1.6. ~$1/mo per bucket (CMK).
  # -------------------------------------------------------------------------

  s3-bucket:plan:
    desc: 'Plan s3-bucket example/basic changes'
    dir: modules/s3-bucket/examples/basic
    cmds:
      - terraform init -upgrade
      - terraform plan -out plan.tfplan

  s3-bucket:up:
    desc: 'Apply s3-bucket module (versioned + SSE-KMS + optional OAC). +$1/mo per bucket.'
    dir: modules/s3-bucket/examples/basic
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  s3-bucket:down:
    desc: 'Destroy s3-bucket example. CMK enters 7-day deletion window.'
    dir: modules/s3-bucket/examples/basic
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  s3-bucket:status:
    desc: 'Show s3-bucket resources currently deployed'
    dir: modules/s3-bucket/examples/basic
    cmds:
      - terraform state list

  # -------------------------------------------------------------------------
  # Secrets — AWS-1.9. ~$1.40/mo per secret (CMK + secret).
  # -------------------------------------------------------------------------

  secrets:plan:
    desc: 'Plan secrets example/basic changes'
    dir: modules/secrets/examples/basic
    cmds:
      - terraform init -upgrade
      - terraform plan -out plan.tfplan

  secrets:up:
    desc: 'Apply secrets module example (Secrets Manager + per-secret CMK). +$1.40/mo per secret.'
    dir: modules/secrets/examples/basic
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  secrets:down:
    desc: 'Destroy secrets example. CMK + secret enter 7-day recovery window.'
    dir: modules/secrets/examples/basic
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  secrets:status:
    desc: 'Show secrets resources currently deployed'
    dir: modules/secrets/examples/basic
    cmds:
      - terraform state list

  # -------------------------------------------------------------------------
  # ElastiCache Redis Serverless — AWS-1.5. ~$11–12/mo idle (Serverless floor + CMK + secret).
  # -------------------------------------------------------------------------

  elasticache-redis:plan:
    desc: 'Plan elasticache-redis example/basic changes'
    dir: modules/elasticache-redis/examples/basic
    cmds:
      - terraform init -upgrade
      - terraform plan -out plan.tfplan

  elasticache-redis:up:
    desc: 'Apply elasticache-redis module (Serverless Redis + TLS + AUTH + per-cache CMK). ~5–7 min. +$11–12/mo.'
    dir: modules/elasticache-redis/examples/basic
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  elasticache-redis:down:
    desc: 'Destroy elasticache-redis example. CMK + AUTH-token secret enter 7-day recovery window.'
    dir: modules/elasticache-redis/examples/basic
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  elasticache-redis:status:
    desc: 'Show elasticache-redis resources currently deployed'
    dir: modules/elasticache-redis/examples/basic
    cmds:
      - terraform state list

  # -------------------------------------------------------------------------
  # Cognito user pool — AWS-1.8. ~$0/mo idle (50K MAU free tier).
  # -------------------------------------------------------------------------

  cognito-user-pool:plan:
    desc: 'Plan cognito-user-pool example/basic changes'
    dir: modules/cognito-user-pool/examples/basic
    cmds:
      - terraform init -upgrade
      - terraform plan -out plan.tfplan

  cognito-user-pool:up:
    desc: 'Apply cognito-user-pool module (user pool + 5 groups + 3 Lambda triggers + Hosted UI). ~1 min. ~$0/mo.'
    dir: modules/cognito-user-pool/examples/basic
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  cognito-user-pool:down:
    desc: 'Destroy cognito-user-pool example. User pool is permanently deleted (no users in dev).'
    dir: modules/cognito-user-pool/examples/basic
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  cognito-user-pool:status:
    desc: 'Show cognito-user-pool resources currently deployed'
    dir: modules/cognito-user-pool/examples/basic
    cmds:
      - terraform state list

  # -------------------------------------------------------------------------
  # Aurora Postgres — AWS-1.4. ~$17–28/mo idle (RDS Proxy is the floor — Aurora itself pauses to ~$0).
  # -------------------------------------------------------------------------

  aurora-postgres:plan:
    desc: 'Plan aurora-postgres example/basic changes'
    dir: modules/aurora-postgres/examples/basic
    cmds:
      - terraform init -upgrade
      - terraform plan -out plan.tfplan

  aurora-postgres:up:
    desc: 'Apply aurora-postgres module (Serverless v2 + RDS Proxy + scale-to-zero). ~10–15 min. +$17–28/mo.'
    dir: modules/aurora-postgres/examples/basic
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  aurora-postgres:down:
    desc: 'Destroy aurora-postgres example. Cluster + proxy deleted; CMK enters 7-day deletion window. skip_final_snapshot=true so no snapshot left behind in dev.'
    dir: modules/aurora-postgres/examples/basic
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  aurora-postgres:status:
    desc: 'Show aurora-postgres resources currently deployed'
    dir: modules/aurora-postgres/examples/basic
    cmds:
      - terraform state list

  # -------------------------------------------------------------------------
  # Ingress — AWS-1.11. Dev defaults backend=apigw (~$0/mo idle).
  # -------------------------------------------------------------------------

  ingress:plan:
    desc: 'Plan ingress example/apigw changes'
    dir: modules/ingress/examples/apigw
    cmds:
      - terraform init -upgrade
      - terraform plan -out plan.tfplan

  ingress:up:
    desc: 'Apply ingress module — APIGW backend (HTTP API + VPC link). ~$0/mo idle.'
    dir: modules/ingress/examples/apigw
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  ingress:down:
    desc: 'Destroy ingress example.'
    dir: modules/ingress/examples/apigw
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  ingress:status:
    desc: 'Show ingress resources currently deployed'
    dir: modules/ingress/examples/apigw
    cmds:
      - terraform state list

  # -------------------------------------------------------------------------
  # CloudFront — AWS-1.7. ~$8/mo idle ($5 WAF ACL + $3 managed rule groups).
  # examples/basic uses a placeholder ACM cert — apply requires a real cert in us-east-1.
  # -------------------------------------------------------------------------

  cloudfront-dist:plan:
    desc: 'Plan cloudfront-dist example/basic changes (validation only without real cert)'
    dir: modules/cloudfront-dist/examples/basic
    cmds:
      - terraform init -upgrade
      - terraform validate

  cloudfront-dist:up:
    desc: 'Apply cloudfront-dist module (CloudFront + WAF + Route53). REQUIRES real ACM cert ARN passed via tfvars.'
    dir: modules/cloudfront-dist/examples/basic
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  cloudfront-dist:down:
    desc: 'Destroy cloudfront-dist example. CloudFront takes ~20 min to fully disable+delete.'
    dir: modules/cloudfront-dist/examples/basic
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  cloudfront-dist:status:
    desc: 'Show cloudfront-dist resources currently deployed'
    dir: modules/cloudfront-dist/examples/basic
    cmds:
      - terraform state list

  # -------------------------------------------------------------------------
  # ECS service — AWS-1.3 the workhorse. ~$5/mo per Fargate Spot task.
  # The basic example deploys a stub nginx:alpine task for plan validation.
  # -------------------------------------------------------------------------

  ecs-service:plan:
    desc: 'Plan ecs-service example/basic changes'
    dir: modules/ecs-service/examples/basic
    cmds:
      - terraform init -upgrade
      - terraform plan -out plan.tfplan

  ecs-service:up:
    desc: 'Apply ecs-service example/basic (1 Fargate Spot task, no LB). +$5/mo. Requires ecs-cluster:up first.'
    dir: modules/ecs-service/examples/basic
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  ecs-service:down:
    desc: 'Destroy ecs-service example.'
    dir: modules/ecs-service/examples/basic
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  ecs-service:status:
    desc: 'Show ecs-service resources currently deployed'
    dir: modules/ecs-service/examples/basic
    cmds:
      - terraform state list

  # -------------------------------------------------------------------------
  # Strata service — AWS-2.1. ~$8/mo (1 Fargate Spot task + 2 secrets w/ CMKs).
  # Composition over modules/ecs-service + secrets + (optional) s3-bucket.
  # The service consumes the live VPC/cluster/Aurora/Redis/Cognito/ingress
  # outputs — apply only AFTER all of those are up.
  # -------------------------------------------------------------------------

  strata-service:plan:
    desc: 'Plan strata-service example/dev changes'
    dir: services/strata/examples/dev
    cmds:
      - terraform init -upgrade
      - terraform plan -out plan.tfplan

  strata-service:up:
    desc: 'Apply strata-service example/dev (1 Fargate Spot task running ghcr.io/kytheros/strata-mcp). +$8/mo. Requires Phase 1 stack up.'
    dir: services/strata/examples/dev
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  strata-service:down:
    desc: 'Destroy strata-service example. Service-scoped secrets enter 7-day recovery window.'
    dir: services/strata/examples/dev
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  strata-service:status:
    desc: 'Show strata-service resources currently deployed'
    dir: services/strata/examples/dev
    cmds:
      - terraform state list

  # -------------------------------------------------------------------------
  # Example-agent service — AWS-3.1. ~$6/mo (1 Fargate Spot task + allowlist CMK).
  # Composition under services/example-agent/infrastructure/. Plan-only until
  # Phase 1 modules + AWS-2.1 are applied (sentinel ARNs in the dev example).
  # -------------------------------------------------------------------------

  example-agent:plan:
    desc: 'Plan example-agent service composition (validate-only — sentinel ARNs prevent plan)'
    dir: services/example-agent/infrastructure/examples/dev
    cmds:
      - terraform init -upgrade
      - terraform validate

  example-agent:up:
    desc: 'Apply example-agent service (Cognito + SSM allowlist + Fargate task). +$6/mo. Requires Phase 1 + AWS-2.1 applied.'
    dir: services/example-agent/infrastructure/examples/dev
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  example-agent:down:
    desc: 'Destroy example-agent service. Cognito user pool deleted; allowlist CMK enters 7-day deletion window.'
    dir: services/example-agent/infrastructure/examples/dev
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  example-agent:status:
    desc: 'Show example-agent resources currently deployed'
    dir: services/example-agent/infrastructure/examples/dev
    cmds:
      - terraform state list

  example-agent:test:
    desc: 'Run the per-tool unit tests for the example-agent SDK tool catalog (AWS-3.3).'
    dir: services/example-agent/app
    cmds:
      - npm run test

  example-agent:simulate-iam:
    desc: 'Run the iam-policy-simulator regression check against the deployed example-agent task role.'
    dir: services/example-agent/infrastructure
    cmds:
      - bash test/iam-policy-simulator.test.sh

  # -------------------------------------------------------------------------
  # Observability — AWS-1.10. ~$2/mo idle (alarms + CMK + SNS).
  # examples/basic wires only NAT anomaly alarms against the live VPC.
  # -------------------------------------------------------------------------

  observability:plan:
    desc: 'Plan observability example/basic changes'
    dir: modules/observability/examples/basic
    cmds:
      - terraform init -upgrade
      - terraform plan -out plan.tfplan

  observability:up:
    desc: 'Apply observability module (8 alarms incl. NAT anomaly + SLO dashboard + SNS topic). +$2/mo idle.'
    dir: modules/observability/examples/basic
    deps: [preflight]
    cmds:
      - terraform init
      - terraform plan -out plan.tfplan
      - terraform apply plan.tfplan

  observability:down:
    desc: 'Destroy observability stack.'
    dir: modules/observability/examples/basic
    deps: [preflight]
    cmds:
      - terraform destroy -auto-approve

  observability:status:
    desc: 'Show observability resources currently deployed'
    dir: modules/observability/examples/basic
    cmds:
      - terraform state list

  # -------------------------------------------------------------------------
  # Stack — bring the full dev stack up or down in dependency order.
  # Add modules to up:/down: as Phase 1 tickets land.
  # -------------------------------------------------------------------------

  up:
    desc: 'Apply the full Phase 1 dev stack (sequenced). 10 modules; ~35 min total. Excludes cloudfront-dist (needs real ACM cert).'
    cmds:
      - task: network:up
      - task: ecs-cluster:up
      - task: s3-bucket:up
      - task: secrets:up
      - task: cognito-user-pool:up
      - task: elasticache-redis:up
      - task: aurora-postgres:up
      - task: ingress:up
      - task: ecs-service:up
      - task: strata-service:up
      - task: example-agent:up
      - task: observability:up
      # Excluded by default — requires real ACM cert in us-east-1:
      # - task: cloudfront-dist:up

  down:
    desc: 'Destroy the full Phase 1 dev stack (reverse order). Frees the entire footprint to ~$0/mo.'
    cmds:
      - task: observability:down
      - task: example-agent:down
      - task: strata-service:down
      - task: ecs-service:down
      # cloudfront-dist:down only if previously applied
      - task: ingress:down
      - task: aurora-postgres:down
      - task: elasticache-redis:down
      - task: cognito-user-pool:down
      - task: secrets:down
      - task: s3-bucket:down
      - task: ecs-cluster:down
      - task: network:down

  status:
    desc: 'Show what is currently deployed'
    cmds:
      - task: whoami
      - 'echo --- Bootstrap ---'
      - task: bootstrap:status
      - 'echo --- Network ---'
      - task: network:status
      - 'echo --- ECS cluster ---'
      - task: ecs-cluster:status
      - 'echo --- S3 bucket (example) ---'
      - task: s3-bucket:status
      - 'echo --- Secrets (example) ---'
      - task: secrets:status
      - 'echo --- Cognito user pool (example) ---'
      - task: cognito-user-pool:status
      - 'echo --- ElastiCache Redis (example) ---'
      - task: elasticache-redis:status
      - 'echo --- Aurora Postgres (example) ---'
      - task: aurora-postgres:status
      - 'echo --- Ingress (example) ---'
      - task: ingress:status
      - 'echo --- CloudFront (example) ---'
      - task: cloudfront-dist:status
      - 'echo --- ECS service (example) ---'
      - task: ecs-service:status
      - 'echo --- Strata service (example) ---'
      - task: strata-service:status
      - 'echo --- Example-agent service (example) ---'
      - task: example-agent:status
      - 'echo --- Observability (example) ---'
      - task: observability:status

  # -------------------------------------------------------------------------
  # Cost — quick reminder of what is burning money right now.
  # -------------------------------------------------------------------------

  cost:
    desc: 'Print rough monthly idle cost of currently deployed modules'
    silent: true
    cmds:
      - |
        echo "Cost reference (always-on idle, dev account, no traffic):"
        echo ""
        echo "  bootstrap:           ~\$0/mo  (always up)"
        echo "  network:             ~\$265/mo (NAT x2 + 9 endpoints x 3 AZ + flow logs)"
        echo "  ecs-cluster:         ~\$1/mo  (CMK only; Fargate has no cluster fee)"
        echo "  s3-bucket (per buc): ~\$1/mo  (CMK; storage = use-based)"
        echo "  secrets (per sec):   ~\$1.40/mo (CMK + secret floor)"
        echo "  ecs-service x 2:     ~\$18/mo (Strata + example-agent on Fargate Spot)"
        echo "  strata-service:      ~\$8/mo  (1 Fargate Spot task + 2 secrets w/ CMKs)"
        echo "  aurora + rds-proxy:  ~\$25/mo (v2 auto-pauses; proxy does not)"
        echo "  redis serverless:    ~\$11–12/mo (ECPU + storage minimums + CMK + AUTH-token secret)"
        echo "  alb (via ingress):   ~\$16/mo (always-on when backend=alb)"
        echo "  cloudwatch logs:     ~\$3/mo"
        echo "                       --------"
        echo "  full Phase 1 idle:   ~\$345/mo"
        echo ""
        echo "Use 'task down' between work sessions to drop to bootstrap-only (~\$0/mo)."
